<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netwatch — Continue Watching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/player.css">
    <style>
        body { overflow-x: hidden; overflow-y: auto; background: #030303; }
        .history-card { background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1), box-shadow 0.3s ease; cursor: pointer; }
        .history-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 18px 48px rgba(0,0,0,0.5); }
        .progress-bar { height: 3px; background: rgba(255,255,255,0.15); }
        .progress-fill { height: 100%; background: #fff; border-radius: 999px; }
    </style>
</head>
<body class="text-white min-h-screen pb-16">

    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[900] flex flex-col gap-2 pointer-events-none" aria-live="polite"></div>

    <nav class="px-5 md:px-12 py-5 flex items-center gap-4 border-b border-white/[0.06]">
        <a href="./index.html" class="glass-btn" aria-label="Open Player">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </a>
        <div class="flex items-center gap-3">
            <span class="brand-mark-sm">N</span>
            <div>
                <h1 class="text-white font-semibold text-base leading-tight">Continue Watching</h1>
                <p class="text-white/40 text-xs">Recently played streams</p>
            </div>
        </div>
        <div class="flex-1"></div>
        <button id="clear-btn" class="secondary-btn text-sm py-2 px-4">Clear All</button>
    </nav>

    <main class="px-5 md:px-12 pt-8">
        <div id="history-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
            <!-- Injected by JS -->
        </div>
        <div id="empty-state" class="hidden text-center py-24">
            <p class="text-white/30 text-lg font-semibold">Nothing here yet</p>
            <p class="text-white/20 text-sm mt-2">Play something in the player and it will appear here.</p>
            <a href="./index.html" class="primary-btn inline-flex mt-8">Open Player</a>
        </div>
    </main>

    <script type="module">
        import { ContinueWatching } from './js/continue-watching.js';

        const mgr   = new ContinueWatching();
        const grid  = document.getElementById('history-grid');
        const empty = document.getElementById('empty-state');
        const clearBtn = document.getElementById('clear-btn');
        const toastContainer = document.getElementById('toast-container');

        function showToast(title, msg = '') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<div class="toast-title">${title}</div>${msg ? `<div class="toast-msg">${msg}</div>` : ''}`;
            toastContainer.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.22s'; setTimeout(()=>t.remove(),240); }, 2800);
        }

        function formatTime(s) {
            if (!s) return '0:00';
            const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=Math.floor(s%60);
            if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            return `${m}:${String(sec).padStart(2,'0')}`;
        }

        function render() {
            const items = mgr.getAll();
            grid.innerHTML = '';
            if (!items.length) { empty.classList.remove('hidden'); clearBtn.classList.add('hidden'); return; }
            empty.classList.add('hidden'); clearBtn.classList.remove('hidden');

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'history-card';
                const poster = item.poster || '';
                const progress = item.progress || 0;
                const pos = item.position || 0;
                const epLabel = item.type === 'tv' && item.season ? `S${item.season} E${item.episode}` : '';
                const savedDate = item.savedAt ? new Date(item.savedAt).toLocaleDateString() : '';

                card.innerHTML = `
                    <div class="relative aspect-video bg-black/50 overflow-hidden">
                        ${poster ? `<img src="${poster}" alt="${item.title}" class="w-full h-full object-cover opacity-80">` : '<div class="w-full h-full bg-[#1c1c1e] flex items-center justify-center"><svg class="w-10 h-10 text-white/20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>'}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        <div class="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm rounded px-1.5 py-0.5 text-xs font-semibold text-white/80">${formatTime(pos)}</div>
                        ${epLabel ? `<div class="absolute top-2 left-2 bg-black/60 backdrop-blur-sm rounded px-1.5 py-0.5 text-xs font-semibold text-white/70">${epLabel}</div>` : ''}
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div class="p-3">
                        <h3 class="text-white text-sm font-semibold truncate">${item.title || 'Untitled'}</h3>
                        <p class="text-white/40 text-xs mt-0.5">${savedDate}</p>
                    </div>
                `;

                card.addEventListener('click', () => {
                    if (!item.src) { showToast('No stream URL', 'This entry has no stream URL saved.'); return; }
                    const params = new URLSearchParams({
                        src:   item.src,
                        title: item.title || '',
                        type:  item.type  || 'movie',
                        id:    item.id    || item.src,
                    });
                    if (item.subUrl)  params.set('sub',    item.subUrl);
                    if (item.poster)  params.set('poster', item.poster);
                    if (item.season)  params.set('season', item.season);
                    if (item.episode) params.set('episode',item.episode);
                    window.location.href = `./index.html?${params.toString()}`;
                });

                grid.appendChild(card);
            });
        }

        clearBtn.addEventListener('click', () => {
            mgr.clear();
            render();
            showToast('Cleared', 'Continue watching history cleared.');
        });

        render();
    </script>
</body>
</html>
