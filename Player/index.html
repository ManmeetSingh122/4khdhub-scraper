<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Netwatch Player</title>
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="./css/player.css">
    <script>
        window.NETWATCH_BACKEND = (function() {
            var h = window.location.hostname;
            if (h === '127.0.0.1' || h === 'localhost') return '';
            return 'https://web-production-aeed3.up.railway.app';
        })();
    </script>
</head>
<body class="bg-black text-white antialiased overflow-hidden" id="player-body">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[900] flex flex-col gap-2 pointer-events-none" aria-live="polite"></div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-[800] bg-black flex flex-col items-center justify-center">
        <div class="brand-mark-lg mb-6">N</div>
        <div class="loader-ring"></div>
        <p class="text-white/40 text-sm font-semibold mt-6 tracking-widest uppercase">Loading Player</p>
    </div>

    <!-- Source Config Panel -->
    <div id="source-panel" class="fixed inset-0 z-[700] hidden flex-col items-center justify-center source-panel-bg px-5 overflow-y-auto py-8">
        <div class="source-panel-card w-full max-w-lg my-auto">
            <div class="flex items-center gap-3 mb-8">
                <span class="brand-mark-sm">N</span>
                <div>
                    <h1 class="text-white text-xl font-semibold tracking-tight">Netwatch Player</h1>
                    <p class="text-white/45 text-xs font-semibold uppercase tracking-widest mt-0.5">Direct Link Player</p>
                </div>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="field-label">Video URL <span class="text-white/30">(MP4 / MKV / WebM / AVI — direct download link)</span></label>
                    <input id="stream-url-input" type="url" class="field-input" placeholder="https://example.com/movie.mp4" autocomplete="off" spellcheck="false">
                </div>
                <div>
                    <label class="field-label">Title</label>
                    <input id="stream-title-input" type="text" class="field-input" placeholder="Movie or Show Title" autocomplete="off">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="field-label">Type</label>
                        <select id="stream-type-select" class="field-input">
                            <option value="movie">Movie</option>
                            <option value="tv">TV Series</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label">Year</label>
                        <input id="stream-year-input" type="number" class="field-input" placeholder="2024" min="1900" max="2099">
                    </div>
                </div>
                <div id="episode-fields" style="display:none">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="field-label">Season</label>
                            <input id="stream-season-input" type="number" class="field-input" placeholder="1" min="1">
                        </div>
                        <div>
                            <label class="field-label">Episode</label>
                            <input id="stream-episode-input" type="number" class="field-input" placeholder="1" min="1">
                        </div>
                    </div>
                </div>
                <div>
                    <label class="field-label">Subtitle URL <span class="text-white/30">(VTT / SRT — optional)</span></label>
                    <input id="subtitle-url-input" type="url" class="field-input" placeholder="https://example.com/subs.vtt" autocomplete="off">
                </div>
                <div>
                    <label class="field-label">Thumbnail / Poster URL <span class="text-white/30">(optional)</span></label>
                    <input id="poster-url-input" type="url" class="field-input" placeholder="https://image.tmdb.org/t/p/original/..." autocomplete="off">
                </div>
            </div>
            <button id="launch-btn" class="primary-btn w-full mt-8">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg>
                Play Video
            </button>
            <p class="text-white/25 text-xs text-center mt-4">Or pass <code class="text-white/40">?src=URL&title=Title</code> as query params</p>

            <!-- Recent Streams -->
            <div id="recent-streams-section" class="hidden mt-8">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-white/45 text-xs font-bold uppercase tracking-widest">Recently Played</h3>
                    <a href="./history.html" class="text-white/35 text-xs font-semibold hover:text-white/70 transition-colors">View All →</a>
                </div>
                <div id="recent-streams-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!--  MAIN PLAYER SHELL                                          -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <div id="player-shell" class="fixed inset-0 z-[100] bg-black hidden" role="main" aria-label="Video Player">

        <!-- Video Element -->
        <video id="video" class="absolute inset-0 w-full h-full object-contain bg-black" playsinline preload="auto" aria-label="Video" crossorigin="anonymous"></video>

        <!-- Subtitle Overlay (custom renderer for SRT/VTT loaded via fetch) -->
        <div id="subtitle-overlay" class="absolute inset-x-0 bottom-28 md:bottom-36 flex justify-center pointer-events-none z-30 px-4">
            <div id="subtitle-text" class="subtitle-cue hidden"></div>
        </div>

        <!-- Buffering Spinner -->
        <div id="buffer-spinner" class="absolute inset-0 flex items-center justify-center z-20 pointer-events-none hidden">
            <div class="buffer-ring"></div>
        </div>

        <!-- Skip Ripple (double-tap) -->
        <div id="skip-ripple-left"  class="skip-ripple left-0"  aria-hidden="true"><span>-10s</span></div>
        <div id="skip-ripple-right" class="skip-ripple right-0" aria-hidden="true"><span>+10s</span></div>

        <!-- ── TOP BAR ── -->
        <div id="top-bar" class="player-bar top-bar absolute top-0 left-0 right-0 z-40 flex items-center gap-4 px-4 md:px-8 py-4 md:py-5">
            <button id="back-btn" class="glass-btn" aria-label="Back">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex-1 min-w-0">
                <h1 id="player-title" class="text-white font-semibold text-base md:text-lg truncate leading-tight"></h1>
                <p id="player-subtitle-label" class="text-white/50 text-xs font-medium mt-0.5 hidden"></p>
            </div>
            <button id="pip-btn" class="glass-btn" aria-label="Picture in Picture" title="PiP">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10h4.5a.5.5 0 01.5.5v5a.5.5 0 01-.5.5H15a.5.5 0 01-.5-.5v-5a.5.5 0 01.5-.5zM3 5h18M3 19h6"/></svg>
            </button>
            <button id="settings-btn" class="glass-btn" aria-label="Settings" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>

        <!-- ── BOTTOM CONTROLS ── -->
        <div id="bottom-controls" class="player-bar bottom-controls absolute bottom-0 left-0 right-0 z-40 px-4 md:px-8 pb-6 md:pb-8 pt-16">

            <!-- Progress / Seek Bar -->
            <div id="seek-container" class="seek-container group mb-3 md:mb-4" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                <div id="seek-track" class="seek-track">
                    <div id="seek-buffer" class="seek-buffer"></div>
                    <div id="seek-fill"   class="seek-fill"></div>
                    <div id="seek-thumb"  class="seek-thumb" aria-hidden="true"></div>
                </div>
                <div id="seek-tooltip" class="seek-tooltip hidden" aria-hidden="true">
                    <span id="seek-tooltip-time"></span>
                </div>
            </div>

            <!-- Controls Row -->
            <div class="flex items-center gap-2 md:gap-3">
                <!-- Left cluster -->
                <button id="prev-ep-btn" class="glass-btn hidden" aria-label="Previous Episode" title="Previous Episode">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="play-btn" class="play-btn" aria-label="Play">
                    <svg id="play-icon"  class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" class="w-7 h-7 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="next-ep-btn" class="glass-btn hidden" aria-label="Next Episode" title="Next Episode">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6l5.5 4V8l-5.5 4zM16 6h2v12h-2z"/></svg>
                </button>
                <button id="skip-back-btn" class="glass-btn" aria-label="Skip back 10 seconds" title="-10s">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="9" y="15" font-size="5" fill="currentColor">10</text></svg>
                </button>
                <button id="skip-fwd-btn" class="glass-btn" aria-label="Skip forward 10 seconds" title="+10s">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="9" y="15" font-size="5" fill="currentColor">10</text></svg>
                </button>

                <!-- Volume -->
                <div class="volume-cluster flex items-center gap-2">
                    <button id="mute-btn" class="glass-btn" aria-label="Mute">
                        <svg id="vol-icon-high" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <svg id="vol-icon-low"  class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
                        <svg id="vol-icon-mute" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <div class="vol-slider-wrap">
                        <input id="vol-slider" type="range" min="0" max="1" step="0.02" value="1" class="vol-slider" aria-label="Volume">
                    </div>
                </div>

                <!-- Time display -->
                <div class="time-display flex items-center gap-1 text-sm font-semibold tabular-nums ml-1">
                    <span id="time-current" class="text-white">0:00</span>
                    <span class="text-white/30">/</span>
                    <span id="time-total"   class="text-white/60">0:00</span>
                </div>

                <div class="flex-1"></div>

                <!-- Right cluster -->
                <button id="subtitle-btn" class="glass-btn" aria-label="Subtitles" title="Subtitles (C)">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-9 8H9.5v-.5h-2v3h2V14H11v1c0 .55-.45 1-1 1H7c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1zm7 0h-1.5v-.5h-2v3h2V14H18v1c0 .55-.45 1-1 1h-3c-.55 0-1-.45-1-1v-4c0-.55.45-1 1-1h3c.55 0 1 .45 1 1v1z"/></svg>
                </button>
                <button id="audio-btn" class="glass-btn audio-btn-label" aria-label="Audio Track" title="Audio (A)">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </button>
                <button id="speed-btn" class="glass-btn speed-btn-label" aria-label="Playback Speed" title="Speed (S)">
                    <span id="speed-label">1×</span>
                </button>
                <button id="fullscreen-btn" class="glass-btn" aria-label="Fullscreen" title="Fullscreen (F)">
                    <svg id="fs-enter-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg id="fs-exit-icon"  class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                </button>
            </div>
        </div>

        <!-- ── SETTINGS PANEL ── -->
        <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-label="Player Settings" aria-modal="true">
            <div class="settings-header">
                <h2 class="text-white font-semibold text-base">Settings</h2>
                <button id="settings-close-btn" class="glass-btn" aria-label="Close settings">&times;</button>
            </div>

            <!-- Stream Source -->
            <div class="settings-section" id="stream-source-section" style="display:none">
                <h3 class="settings-section-title">Stream Source</h3>
                <div id="stream-source-list" class="settings-option-list">
                </div>
            </div>

            <!-- Audio Language -->
            <div class="settings-section">
                <h3 class="settings-section-title">Audio Track</h3>
                <div id="audio-list" class="settings-option-list">
                    <button class="settings-option active" data-value="0">
                        <span>Track 1</span><span class="settings-option-badge">Default</span>
                    </button>
                </div>
            </div>

            <!-- Subtitles -->
            <div class="settings-section">
                <h3 class="settings-section-title">Subtitles</h3>
                <div id="subtitle-list" class="settings-option-list">
                    <button class="settings-option active" data-sub="off" data-value="off">
                        <span>Off</span>
                    </button>
                </div>
                <div class="mt-3">
                    <label class="field-label text-xs">Load External Subtitle</label>
                    <div class="flex gap-2 mt-1">
                        <input id="custom-sub-input" type="url" class="field-input flex-1 text-sm" placeholder="https://...subs.vtt or .srt">
                        <button id="load-sub-btn" class="secondary-btn text-sm px-3">Load</button>
                    </div>
                </div>
            </div>

            <!-- Playback Speed -->
            <div class="settings-section">
                <h3 class="settings-section-title">Playback Speed</h3>
                <div id="speed-list" class="settings-option-list flex-row flex-wrap gap-2">
                    <button class="settings-option speed-opt" data-speed="0.25">0.25×</button>
                    <button class="settings-option speed-opt" data-speed="0.5">0.5×</button>
                    <button class="settings-option speed-opt" data-speed="0.75">0.75×</button>
                    <button class="settings-option speed-opt active" data-speed="1">1×</button>
                    <button class="settings-option speed-opt" data-speed="1.25">1.25×</button>
                    <button class="settings-option speed-opt" data-speed="1.5">1.5×</button>
                    <button class="settings-option speed-opt" data-speed="2">2×</button>
                </div>
            </div>

            <!-- Buffer / Stats -->
            <div class="settings-section">
                <h3 class="settings-section-title">Playback Info</h3>
                <div id="cache-info" class="cache-info-box">
                    <div class="flex justify-between text-xs text-white/60 mb-2">
                        <span>Buffer Ahead</span>
                        <span id="cache-buffer-val">—</span>
                    </div>
                    <div class="cache-bar-track"><div id="cache-bar-fill" class="cache-bar-fill" style="width:0%"></div></div>
                    <div class="flex justify-between text-xs text-white/40 mt-3">
                        <span>Resolution</span><span id="cache-res-val">—</span>
                    </div>
                    <div class="flex justify-between text-xs text-white/40 mt-1">
                        <span>Dropped Frames</span><span id="cache-drop-val">—</span>
                    </div>
                    <div class="flex justify-between text-xs text-white/40 mt-1">
                        <span>Format</span><span id="cache-fmt-val">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── AUTO-NEXT EPISODE OVERLAY ── -->
        <div id="autonext-overlay" class="autonext-overlay hidden" aria-live="polite">
            <div class="autonext-card">
                <p class="text-white/60 text-xs font-semibold uppercase tracking-widest mb-1">Up Next</p>
                <h3 id="autonext-title" class="text-white font-semibold text-base mb-4"></h3>
                <div class="autonext-progress-ring-wrap">
                    <svg class="autonext-ring" viewBox="0 0 44 44" aria-hidden="true">
                        <circle class="autonext-ring-track" cx="22" cy="22" r="18"/>
                        <circle id="autonext-ring-fill" class="autonext-ring-fill" cx="22" cy="22" r="18"/>
                    </svg>
                    <span id="autonext-countdown" class="autonext-countdown-num">5</span>
                </div>
                <div class="flex gap-3 mt-5">
                    <button id="autonext-play-btn" class="primary-btn flex-1 py-2.5 text-sm">Play Now</button>
                    <button id="autonext-cancel-btn" class="secondary-btn flex-1 py-2.5 text-sm">Cancel</button>
                </div>
            </div>
        </div>

    </div><!-- /player-shell -->

    <script type="module" src="./js/player.js?v=3"></script>
</body>
</html>
